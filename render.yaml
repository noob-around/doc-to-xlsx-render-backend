services:
  - type: web
    name: doc-to-xlsx-backend
    runtime: docker
    repo: https://github.com/noob-around/doc-to-xlsx-render-backend.git
    branch: main
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_MAX_TOKENS
        value: "4096"
      - key: UPLOAD_LIMIT_MB
        value: "20"
